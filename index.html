<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>maintenance</title>
    <style>
        body {
            background-color: #0f0f0f;
            color: #555; /* Warna abu gelap biar misterius */
            font-family: 'Courier New', Courier, monospace; /* Font ala terminal */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        .content {
            padding: 20px;
        }

        h1 {
            font-size: 1.5rem;
            letter-spacing: 2px;
            margin-bottom: 10px;
            color: #00ff41; /* Hijau Matrix/Terminal */
        }

        p {
            font-size: 0.9rem;
            opacity: 0.7;
        }

        /* Animasi kedip biar kayak kursor terminal */
        .cursor {
            animation: blink 1s infinite;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }
    </style>
</head>
<body>

<div class="content">
    <h1>website is being created.<span class="cursor">_</span></h1>
    <p>contact: root@achanam.my.id</p>
</div>

</body>
</html>
