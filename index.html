<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Under Maintenance | Coming Back Soon</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; 
            touch-action: none;
            background-color: #d1d1d1;
            font-family: 'Arial Black', Gadget, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 1500px;
        }

        /* --- JUDUL UTAMA (DI BELAKANG PITA) --- */
        .content-main {
            text-align: center;
            z-index: 1;
            position: absolute;
            width: 100%;
        }

        h1 {
            font-size: clamp(3rem, 12vw, 6rem);
            line-height: 0.85;
            margin: 0;
            color: #1a1a1a;
            letter-spacing: -2px;
            text-transform: uppercase;
        }

        .sub-main {
            font-family: 'Helvetica', sans-serif;
            font-weight: bold;
            color: #555;
            margin-top: 10px;
            font-size: clamp(0.9rem, 4vw, 1.2rem);
        }

        /* --- KETERANGAN & CONTACT (DI BAWAH) --- */
        .content-footer {
            position: absolute;
            bottom: 10%; 
            text-align: center;
            z-index: 5;
            width: 90%;
        }

        .desc-english, .contact-info {
            font-family: 'Helvetica', sans-serif;
            font-weight: normal;
            font-size: clamp(0.7rem, 3vw, 0.85rem);
            color: #555;
            line-height: 1.5;
        }

        .contact-info {
            margin-top: 10px;
            font-weight: bold;
            color: #333;
        }

        /* --- MASTER TAPE STYLE (LUSUH & MENYILANG) --- */
        .tape {
            position: absolute;
            width: 250vw; 
            height: clamp(60px, 11vw, 90px);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: clamp(0.8rem, 3vw, 1.3rem);
            color: rgba(0,0,0,0.7);
            text-transform: uppercase;
            white-space: nowrap;
            user-select: none;
            
            /* Tekstur Lusuh & Kotor */
            background-color: #fdd835;
            background-image: 
                url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.15'/%3E%3C/svg%3E"),
                linear-gradient(135deg, transparent 40%, rgba(0,0,0,0.12) 45%, rgba(255,255,255,0.1) 50%, transparent 55%);
            background-size: auto, 600px 100%;
        }

        .tape::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: linear-gradient(rgba(0,0,0,0.05) 50%, transparent 50%);
            background-size: 100% 4px; /* Tekstur serat lawas */
            mix-blend-mode: multiply;
        }

        /* --- PITA KANAN (X) --- */
        .tape-right {
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(18deg) rotateX(15deg);
            z-index: 10;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        /* --- PITA KIRI (X) --- */
        .tape-left {
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-14deg) rotateX(-12deg);
            background-color: #ffc107;
            z-index: 11; /* Numpang di atas */
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .tape span {
            padding: 0 40px;
            letter-spacing: 2px;
            filter: drop-shadow(1px 1px 0px rgba(255,255,255,0.2));
        }

        .noise {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");
            pointer-events: none; z-index: 20; opacity: 0.3;
        }

        @media (max-width: 600px) {
            .tape { width: 400vw; }
            h1 { font-size: 3.5rem; }
        }
    </style>
</head>
<body>

    <div class="noise"></div>

    <div class="content-main">
        <h1>UNDER<br>MAINTENANCE</h1>
        <div class="sub-main">ACH ANAM INFRASTRUCTURE PROJECT</div>
    </div>

    <div class="tape tape-right">
        <span>MAINTENANCE</span><span>INFRASTRUCTURE</span><span>ACHANAM</span><span>DO NOT ENTER</span>
    </div>

    <div class="tape tape-left">
        <span>INFRASTRUCTURE</span><span>PLEASE WAIT</span><span>MAINTENANCE</span><span>COMING SOON</span>
    </div>

    <div class="content-footer">
        <div class="desc-english">
            achanam.my.id is currently under preparation.<br>
            We will be back online shortly.
        </div>
        <div class="contact-info">
            CONTACT:<br>
            dev@achanam.my.id | admin@achanam.my.id
        </div>
    </div>

</body>
</html>
